name: Robot Framework Tests

on:
  push:
    branched: [main]
  pull_request:
    branches: [main]

jobs:
  robot-tests:
    run-on:    ubuntu-latest
    steps:
    - name:      Checkout code
      user: actions/checkout@v3

    - name:      Setup Python
      user: actions/setup-python@v4
      with: 
        python-version: '3.9'

    - name:      Install dependencies
      run: |
        pip install robotframework
        pip install robotframework-requests
        pip install robotframework-databaselibrary

    - name:      Run Robot Tests
      run: |
        robot -- include smoke tests/api_tests2.robot
        robot -- include smoke tests/custom_keywords_tests.robot
        robot -- include smoke tests/database_tests.robot

    - name:      Upload Test Results
      if: always()
      user: actions/upload-artifact@v3
      with:
        name: rebot-results
        path: |
          output.xml
          log.html
          report.html
          